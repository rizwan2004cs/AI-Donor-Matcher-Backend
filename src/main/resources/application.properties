# ===========================
# DATABASE (PostgreSQL)
# ===========================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${PORT:8080}

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# JWT
# ===========================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ===========================
# Transactional email (optional, separate from Firebase auth mail)
# ===========================
email.provider=${EMAIL_PROVIDER:resend}
email.resend.api-key=${RESEND_API_KEY:}
mail.from=${MAIL_FROM:}

# ===========================
# Firebase Admin
# ===========================
firebase.admin.project-id=${FIREBASE_ADMIN_PROJECT_ID:}
firebase.admin.client-email=${FIREBASE_ADMIN_CLIENT_EMAIL:}
firebase.admin.private-key=${FIREBASE_ADMIN_PRIVATE_KEY:}
firebase.admin.credentials-path=${FIREBASE_ADMIN_CREDENTIALS_PATH:}
firebase.admin.credentials-json=${FIREBASE_ADMIN_CREDENTIALS_JSON:}
firebase.migration.enabled=${FIREBASE_MIGRATION_ENABLED:false}
firebase.migration.exit-after-run=${FIREBASE_MIGRATION_EXIT_AFTER_RUN:true}

# ===========================
# Cloudinary
# ===========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# ===========================
# App
# ===========================
app.base-url=${APP_BASE_URL:http://localhost:5173}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,https://*.vercel.app}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
geocoding.provider=${GEOCODING_PROVIDER:nominatim}
geocoding.nominatim.base-url=${GEOCODING_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
geocoding.nominatim.user-agent=${GEOCODING_NOMINATIM_USER_AGENT:AI-Donor-Matcher/1.0}
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
