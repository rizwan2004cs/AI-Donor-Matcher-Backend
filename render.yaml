services:
  - type: web
    name: ai-donor-matcher-backend
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /v3/api-docs
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        value: http://localhost:5173,https://*.vercel.app
      - key: GEOCODING_PROVIDER
        value: nominatim
      - key: GEOCODING_NOMINATIM_USER_AGENT
        value: AI-Donor-Matcher/1.0
      - key: EMAIL_PROVIDER
        value: resend
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
